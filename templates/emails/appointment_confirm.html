<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }
        .header {
            background: #198754;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .content {
            margin-top: 20px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="header">
        <h2>Appointment Confirmed ✅</h2>
    </div>

    <div class="content">
        <p>Hello {{ user.username }},</p>

        <p>Your appointment has been successfully booked.</p>

        <ul>
            <li><strong>Doctor:</strong> Dr. {{ doctor.username }}</li>
            <li><strong>Date:</strong> {{ date }}</li>
            <li><strong>Time:</strong> {{ time }}</li>
        </ul>

        <p>Please arrive 10 minutes early.</p>
    </div>

    <div class="footer">
        Doctor Appointment System
    </div>
</div>

</body>
</html>
